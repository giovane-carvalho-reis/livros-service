spring.application.name=livros-service

spring.datasource.url=jdbc:postgresql://db:5432/books-service
# Dialeto explícito para evitar erro do Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=9191
spring.datasource.username=postgres
spring.datasource.password=postgres@local

# Deixado dessa forma para testes
spring.jpa.hibernate.ddl-auto=update

spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=servlet

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}

#Observabilidade
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=1
management.tracing.propagation.type=w3c

management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

logging.include-application-name=false